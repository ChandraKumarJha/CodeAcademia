<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body>
  <button id="menu-btn" class="text-3xl p-2">
    ☰
</button>

<div id="sidebar"
     class="fixed top-0 left-[-250px] h-screen w-64 bg-gray-900 text-white transition-all duration-300">

    <button id="close-btn" class="text-2xl p-4">✕</button>

    <a href="#" class="block p-4 hover:bg-gray-700">Home</a>
    <a href="#" class="block p-4 hover:bg-gray-700">Projects</a>
</div>
  <script>
    const sidebar = document.getElementById("sidebar");

document.getElementById("menu-btn").onclick = () => {
    sidebar.classList.remove("-left-[250px]");
    sidebar.classList.add("left-0");
};

document.getElementById("close-btn").onclick = () => {
    sidebar.classList.remove("left-0");
    sidebar.classList.add("-left-[250px]");
};
  </script>
</body>
</html>
