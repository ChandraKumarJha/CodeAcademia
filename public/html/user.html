<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/output.css">

    <!-- Remix Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    
    <title>Document</title>
</head>
<body class="h-screen w-screen bg-slate-100 text-black dark:bg-gray-900 dark:text-white 
  transition-colors duration-300">
  <div class="flex">

    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 h-screen sm:w-72 w-[18%] dark:bg-slate-800 bg-white shadow-xl transition-all duration-300 z-50">

        <!-- Logo -->
        <div class="sidebar-item flex items-center gap-4 p-6">

          <div class="w-12 h-12 rounded-xl bg-violet-600 flex items-center justify-center text-white font-bold">
            CA
          </div>

          <div class="sidebar-text">
            <h1 class="font-bold text-xl">Code Academia</h1>
          </div>

        </div>

        <!-- Search -->
        <div id="searchBox"
          class="sidebar-item flex items-center gap-4 bg-violet-50 dark:bg-violet-500 rounded-xl px-4 py-3 mx-4">

          <i class="ri-search-line text-2xl"></i>

          <input
            id="searchInput"
            class="sidebar-text bg-transparent outline-none w-full"
            placeholder="Search..." />

          </div>  

        <!-- Menu -->
        <nav class="mt-8">

            <a href="#" class="sidebar-item flex items-center gap-4 px-4 py-4 dark:hover:bg-violet-500 
            hover:bg-violet-50 rounded-xl">
              <i class="ri-info-i text-2xl"></i>
              <span class="sidebar-text">About</span>
            </a>

            <a href="#" class="sidebar-item flex items-center gap-4 px-4 py-4 hover:bg-violet-50 
            dark:hover:bg-violet-500 rounded-xl">
              <i class="ri-book-read-line text-2xl"></i>
              <span class="sidebar-text">Courses</span>
            </a>

            <a href="#" class="sidebar-item flex items-center gap-4 px-4 py-4 hover:bg-violet-50 
            dark:hover:bg-violet-500 rounded-xl">
              <i class="ri-file-3-line text-2xl"></i>
              <span class="sidebar-text">Docs</span>
            </a>

            <a href="#" class="sidebar-item flex items-center gap-4 px-4 py-4 hover:bg-violet-50 
            dark:hover:bg-violet-500 rounded-xl">
              <i class="ri-user-line text-2xl"></i>
              <span class="sidebar-text">User</span>
            </a>

        </nav>

        <!-- Bottom -->
        <div class="absolute bottom-0 w-full p-5">

            <div class="sidebar-item flex items-center justify-between bg-violet-50 dark:bg-violet-500 rounded-xl">

              <button id="themeToggle" class="w-full h-full rounded-xl bg-inherit p-4">

                <div class="flex items-center gap-4">
                
                    <i class="ri-moon-line text-2xl"></i>
                
                    <span class="sidebar-text">Dark Mode</span>
                
                </div>

              </button>

            </div>

        </div>

    </aside>

    <!-- Toggle Button -->
    <button id="toggleBtn"
        class="fixed top-8 left-[270px] w-10 h-10 rounded-full bg-violet-600 text-white shadow-lg z-50 transition-all duration-300">

        <i id="arrow" class="ri-arrow-left-s-line text-xl"></i>

    </button>

    <!-- Main Content -->
    <main id="main"
        class="ml-72 p-10 transition-all duration-300 w-full">

        <h1 class="text-4xl font-bold">Dashboard</h1>

        <p class="mt-5 text-gray-600">
            Your content goes here...
        </p>

    </main>

</div>

<script src="../js/sidebar.js "></script>
</body>
</html>
