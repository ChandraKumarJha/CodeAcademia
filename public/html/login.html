<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in</title>
    <link rel="stylesheet" href="/css/output.css" />
    <script src="https://kit.fontawesome.com/6e037d5a8d.js" crossorigin="anonymous"></script>
  </head>
  <body class="h-screen w-screen text-black dark:bg-gray-900 dark:text-white transition-colors 
    duration-300 ">
    <div class="h-full w-full flex justify-center items-center bg-emerald-500 dark:bg-emerald-900">
        <form action="/html/courses.html" method="POST" class="relative h-2/3 w-2/5 flex justify-center items-center flex-col">
            <h1 class="w-full py-7 font-semibold absolute top-0 text-4xl sm:text-5xl lg:text-6xl text-center 
            text-white bg-emerald-600 rounded-xl dark:bg-emerald-400 dark:text-black">Login Form</h1>
            <div class="flex justify-center items-center flex-col w-full h-full bg-white rounded-xl dark:bg-black">
                <input type="text" id="name" name="username" autocomplete="name" class="h-[50px] w-11/12 text-center 
                text-xl mb-6 border-2 border-gray-300 outline-none rounded-lg focus:ring-0 dark:bg-black" placeholder="Username"/>
                <div class="h-[50px] w-11/12 text-center text-xl mb-6 rounded-lg relative" required>
                    <div class="h-[50px] w-[50px] flex justify-center items-center absolute left-0 bg-lime-400 rounded-lg">
                        <i class="fa-regular fa-user h-[30px] w-[30px] bg-inherit"></i>
                    </div>
                    <input type="email" id="email" name="email" autocomplete="email" class=
                    "h-full w-full text-center rounded-lg border-2 border-gray-300 outline-none 
                    focus:ring-0 dark:bg-black" placeholder="Email" required/>
                </div>

                <div class="h-[50px] w-11/12 text-center text-xl mb-6 rounded-lg relative">
                    <div class="h-[50px] w-[50px] flex justify-center items-center absolute left-0 bg-lime-400 rounded-lg">
                        <i class="fa-solid fa-lock h-[30px] w-[30px] bg-inherit"></i>
                    </div>
                    <input type="password" id="password" name="password" autocomplete="current-password" class=
                    "h-full w-full text-center rounded-lg border-2 border-gray-300 outline-none 
                    focus:ring-0 dark:bg-black" placeholder="Password" required/>
                    <button type="button" id="togglePassword" aria-label="Show password" class="h-[40px] w-[40px] absolute right-0">👁️</button>
                </div>
                <input type="submit" value="Login" class="h-14 w-11/12 absolute bottom-14 bg-emerald-600 text-white 
                dark:text-black flex justify-center items-center dark:bg-emerald-400 cursor-pointer
                text-2xl font-semibold rounded-lg">
            </div>
        </form>
    </div>
    <script src="../js/indexScript.js"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');

        toggleButton.addEventListener('click', () => {
          const isPassword = passwordInput.getAttribute('type') === 'password';
          passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
          toggleButton.textContent = isPassword ? '🙈' : '👁️';
          toggleButton.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        });
    </script>
  </body>
</html>
